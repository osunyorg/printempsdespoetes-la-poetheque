[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/projets/index.html"
to = "/poemes/"

[[redirects]]
from = "/actualites/index.html"
to = "/parutions/"

[[redirects]]
from = "/organisations/index.html"
to = "/editeurs/"

[[redirects]]
from = "/organisations/a-dos-dane/index.html"
to = "/editeurs/a-dos-dane/"

[[redirects]]
from = "/organisations/categories/editeur/index.html"
to = "/editeurs/categories/editeur/"

[[redirects]]
from = "/personnes/index.html"
to = "/poetes/"

